<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="logo.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course Player — Brightside</title>
<link rel="stylesheet" href="shared.css">
<style>
  body { background: var(--warm-white); }

  /* COURSE LAYOUT */
  .course-layout {
    display: grid;
    grid-template-columns: 340px 1fr;
    min-height: calc(100vh - 90px);
    margin-top: 90px;
  }

  /* SIDEBAR */
  .sidebar {
    background: white;
    border-right: 1px solid rgba(57,87,49,0.08);
    height: calc(100vh - 90px);
    position: sticky;
    top: 90px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: rgba(57,87,49,0.15); border-radius: 2px; }

  .sidebar-header { padding: 1.5rem; border-bottom: 1px solid rgba(57,87,49,0.06); }
  .sidebar-course-title { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; color: var(--forest); margin-bottom: 0.5rem; }
  .sidebar-progress-bar { height: 6px; background: rgba(57,87,49,0.08); border-radius: 100px; overflow: hidden; margin-bottom: 0.4rem; }
  .sidebar-progress-fill { height: 100%; width: 35%; background: linear-gradient(90deg, var(--sage), var(--mint)); border-radius: 100px; transition: width 0.5s ease; }
  .sidebar-progress-label { font-size: 0.75rem; color: #9ca3af; font-family: 'DM Mono', monospace; }

  /* COURSE SWITCHER */
  .course-switcher { padding: 1rem 1.5rem; border-bottom: 1px solid rgba(57,87,49,0.06); }
  .course-switcher-label { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: #9ca3af; font-family: 'DM Mono', monospace; margin-bottom: 0.5rem; }
  .course-select { width: 100%; padding: 0.6rem 0.8rem; border: 1px solid rgba(57,87,49,0.12); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; color: var(--forest); outline: none; background: var(--warm-white); cursor: pointer; }
  .course-select:focus { border-color: var(--sage); }

  /* MODULE LIST */
  .module-list { flex: 1; }
  .module-group { }
  .module-group-header {
    padding: 1rem 1.5rem 0.5rem;
    font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: #9ca3af; font-family: 'DM Mono', monospace;
    position: sticky; top: 0; background: white; z-index: 1;
    border-bottom: 1px solid rgba(57,87,49,0.04);
  }
  .lesson-item {
    display: flex; gap: 0.8rem; padding: 0.8rem 1.5rem;
    cursor: pointer; transition: background 0.15s; align-items: center;
    border-left: 3px solid transparent;
  }
  .lesson-item:hover { background: rgba(57,87,49,0.03); }
  .lesson-item.active { background: rgba(57,87,49,0.05); border-left-color: var(--gold); }
  .lesson-item.completed .lesson-icon { background: var(--mint); color: white; }
  .lesson-icon {
    width: 32px; height: 32px; border-radius: 8px; background: rgba(57,87,49,0.06);
    display: flex; align-items: center; justify-content: center; font-size: 0.75rem;
    flex-shrink: 0; transition: all 0.2s; color: #6b7280;
  }
  .lesson-item.active .lesson-icon { background: var(--gold); color: var(--forest); }
  .lesson-info { flex: 1; min-width: 0; }
  .lesson-name { font-size: 0.84rem; font-weight: 500; color: var(--forest); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lesson-item.active .lesson-name { font-weight: 700; }
  .lesson-meta { font-size: 0.72rem; color: #9ca3af; display: flex; gap: 0.6rem; margin-top: 0.15rem; }

  /* MAIN CONTENT */
  .course-main { padding: 2.5rem 3rem 4rem; max-width: 900px; }

  /* VIDEO PLAYER */
  .video-player {
    background: var(--charcoal);
    border-radius: 20px;
    aspect-ratio: 16/9;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden; margin-bottom: 2rem;
  }
  .video-bg-pattern {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(142,186,126,0.15) 0%, transparent 60%),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 1px, transparent 1px, transparent 40px);
  }
  .play-button {
    position: relative; z-index: 1;
    width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px); border: 2px solid rgba(255,255,255,0.25);
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    transition: all 0.25s; font-size: 1.6rem; padding-left: 4px;
  }
  .play-button:hover { background: rgba(255,255,255,0.25); transform: scale(1.08); }
  .video-label { position: absolute; bottom: 1.5rem; left: 1.5rem; color: rgba(255,255,255,0.6); font-size: 0.78rem; font-family: 'DM Mono', monospace; letter-spacing: 0.08em; }
  .video-duration { position: absolute; bottom: 1.5rem; right: 1.5rem; color: rgba(255,255,255,0.5); font-size: 0.78rem; font-family: 'DM Mono', monospace; }

  /* LESSON HEADER */
  .lesson-breadcrumb { font-size: 0.78rem; color: #9ca3af; margin-bottom: 0.5rem; font-family: 'DM Mono', monospace; letter-spacing: 0.05em; }
  .lesson-title { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 900; color: var(--forest); margin-bottom: 0.75rem; }
  .lesson-tags { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2rem; }

  /* LESSON BODY */
  .lesson-body { }
  .lesson-intro { font-size: 1rem; line-height: 1.75; color: #4a5568; margin-bottom: 2rem; padding-bottom: 2rem; border-bottom: 1px solid rgba(57,87,49,0.08); }

  .content-block { margin-bottom: 2rem; }
  .content-block h3 { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; color: var(--forest); margin-bottom: 0.8rem; }
  .content-block p { font-size: 0.93rem; line-height: 1.75; color: #4a5568; margin-bottom: 0.8rem; }

  /* KEY CONCEPT */
  .key-concept { background: rgba(57,87,49,0.04); border-left: 4px solid var(--sage); border-radius: 0 12px 12px 0; padding: 1.2rem 1.5rem; margin: 1.5rem 0; }
  .key-concept-label { font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--sage); font-family: 'DM Mono', monospace; margin-bottom: 0.4rem; }
  .key-concept-text { font-size: 0.93rem; line-height: 1.65; color: var(--forest); }

  /* EXAMPLE BOX */
  .example-box { background: white; border: 1px solid rgba(57,87,49,0.08); border-radius: 14px; padding: 1.5rem; margin: 1.5rem 0; }
  .example-label { font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); font-family: 'DM Mono', monospace; margin-bottom: 0.8rem; }
  .example-scenario { background: var(--cream); border-radius: 10px; padding: 1rem; font-size: 0.88rem; line-height: 1.6; color: var(--charcoal); }

  /* QUIZ */
  .quiz-block { background: white; border: 2px solid rgba(57,87,49,0.08); border-radius: 18px; padding: 2rem; margin: 2rem 0; }
  .quiz-label { font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--rust); font-family: 'DM Mono', monospace; margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.5rem; }
  .quiz-question { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: var(--forest); margin-bottom: 1.2rem; }
  .quiz-options { display: flex; flex-direction: column; gap: 0.6rem; }
  .quiz-option { padding: 0.9rem 1.2rem; border: 2px solid rgba(57,87,49,0.1); border-radius: 10px; font-size: 0.9rem; color: var(--forest); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.8rem; }
  .quiz-option:hover { border-color: var(--sage); background: rgba(79,121,68,0.04); }
  .quiz-option.correct { border-color: var(--mint); background: rgba(142,186,126,0.1); color: var(--sage); }
  .quiz-option.wrong { border-color: #fca5a5; background: rgba(239,68,68,0.06); color: #dc2626; }
  .quiz-option-letter { width: 28px; height: 28px; border-radius: 50%; background: rgba(57,87,49,0.06); display: flex; align-items: center; justify-content: center; font-size: 0.78rem; font-weight: 700; flex-shrink: 0; }
  .quiz-feedback { margin-top: 1rem; padding: 0.8rem 1rem; border-radius: 10px; font-size: 0.88rem; display: none; }
  .quiz-feedback.show { display: block; }
  .quiz-feedback.correct-fb { background: rgba(142,186,126,0.12); color: var(--sage); }
  .quiz-feedback.wrong-fb { background: rgba(239,68,68,0.08); color: #dc2626; }

  /* LESSON NAVIGATION */
  .lesson-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 3rem; padding-top: 2rem; border-top: 1px solid rgba(57,87,49,0.08); }
  .nav-prev, .nav-next { display: flex; gap: 0.8rem; align-items: center; padding: 0.8rem 1.2rem; border-radius: 12px; cursor: pointer; transition: all 0.2s; border: 1px solid rgba(57,87,49,0.1); background: white; font-family: 'DM Sans', sans-serif; }
  .nav-prev:hover, .nav-next:hover { border-color: var(--sage); background: rgba(57,87,49,0.03); }
  .nav-lesson-name { font-size: 0.82rem; font-weight: 600; color: var(--forest); max-width: 180px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .nav-direction { font-size: 0.7rem; color: #9ca3af; font-family: 'DM Mono', monospace; letter-spacing: 0.08em; }
  .mark-complete-btn { padding: 0.8rem 1.8rem; border-radius: 100px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: all 0.25s; }

  /* RESOURCES PANEL */
  .resources-panel { background: var(--cream); border-radius: 16px; padding: 1.5rem; margin-top: 2rem; }
  .resources-panel-title { font-weight: 700; font-size: 0.9rem; color: var(--forest); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
  .resource-links { display: flex; flex-direction: column; gap: 0.5rem; }
  .resource-link { display: flex; align-items: center; gap: 0.7rem; padding: 0.7rem 0.9rem; background: white; border-radius: 10px; border: 1px solid rgba(57,87,49,0.06); text-decoration: none; color: var(--forest); font-size: 0.84rem; font-weight: 500; transition: all 0.2s; }
  .resource-link:hover { border-color: var(--sage); box-shadow: 0 4px 12px rgba(57,87,49,0.06); }
  .resource-link-icon { font-size: 1rem; }

  @media (max-width: 900px) {
    .course-layout { grid-template-columns: 1fr; margin-top: 90px; }
    .sidebar { height: auto; position: relative; top: 0; border-right: none; border-bottom: 1px solid rgba(57,87,49,0.08); }
    .course-main { padding: 1.5rem; }
  }
</style>
</head>
<body>

<nav id="mainNav">
  <a href="index.html" class="nav-logo"><img src="logo.png" alt="Brightside" class="nav-logo-img"><span class="nav-brand"><span class="brand-primary">Bright</span><span class="brand-secondary">side</span></span></a>
  <ul class="nav-links">
    <li><a href="index.html" id="nl-home">Home</a></li>
    <li><a href="about.html" id="nl-about">About Us</a></li>
    <li><a href="curriculum.html" id="nl-curriculum">Curriculum</a></li>
    <li><a href="medical.html" id="nl-medical">Medical Finances</a></li>
    <li><a href="course.html" id="nl-course">Courses</a></li>
    <li><a href="https://donorbox.org/brightside-finance-operations" class="nav-cta">Donate</a></li>
  </ul>
  <button class="nav-hamburger" onclick="document.getElementById('mobileMenu').classList.add('open')" aria-label="Open menu">
    <span></span><span></span><span></span>
  </button>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <button class="mobile-close" onclick="document.getElementById('mobileMenu').classList.remove('open')">✕</button>
  <a href="index.html" onclick="document.getElementById('mobileMenu').classList.remove('open')">Home</a>
  <a href="about.html" onclick="document.getElementById('mobileMenu').classList.remove('open')">About Us</a>
  <a href="curriculum.html" onclick="document.getElementById('mobileMenu').classList.remove('open')">Curriculum</a>
  <a href="medical.html" onclick="document.getElementById('mobileMenu').classList.remove('open')">Medical Finances</a>
  <a href="course.html" onclick="document.getElementById('mobileMenu').classList.remove('open')">Courses</a>
  <a href="https://donorbox.org/brightside-finance-operations" onclick="document.getElementById('mobileMenu').classList.remove('open')" style="color:var(--primary);background:var(--secondary);padding:0.6rem 1.8rem;border-radius:100px;font-size:1rem;">Donate</a>
</div>
<div class="course-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-course-title" id="sidebarTitle">Launch Pad: Adult Finance Foundations</div>
      <div class="sidebar-progress-bar"><div class="sidebar-progress-fill" id="progressFill"></div></div>
      <div class="sidebar-progress-label" id="progressLabel">4 of 12 lessons complete</div>
    </div>

    <div class="course-switcher">
      <div class="course-switcher-label">Switch Program</div>
      <select class="course-select" id="courseSwitcher" onchange="switchCourse(this.value)">
        <option value="launchpad" selected>🏠 Launch Pad (Ages 19–35)</option>
        <option value="sprouts">🧸 Money Sprouts (Ages 5–10)</option>
        <option value="smartstart">🎒 Smart Start (Ages 11–18)</option>
        <option value="peak">📈 Peak Years (Ages 35–55)</option>
        <option value="golden">🌅 Golden Path (Ages 55+)</option>
        <option value="medical">🏥 Medical Finances</option>
      </select>
    </div>

    <div class="module-list" id="moduleList"></div>
  </aside>

  <!-- MAIN COURSE CONTENT -->
  <main class="course-main" id="courseMain">
    <!-- Content injected by JS -->
  </main>

</div>

<script>
const courses = {
  launchpad: {
    title: "Launch Pad: Adult Finance Foundations",
    totalLessons: 12,
    completedLessons: 4,
    modules: [
      { title: "Module 1: Budgeting", lessons: [
        { id: 1, title: "Adult Budgeting Overview", type: "🎬", duration: "12 min", completed: true },
        { id: 2, title: "The 50/30/20 Rule", type: "🎬", duration: "18 min", completed: true },
        { id: 3, title: "Zero-Based Budgeting", type: "📄", duration: "10 min", completed: true },
      ]},
      { title: "Module 2: Emergency Fund", lessons: [
        { id: 4, title: "Why You Need 3-6 Months", type: "🎬", duration: "14 min", completed: true },
        { id: 5, title: "Building It on a Tight Budget", type: "🎬", duration: "16 min", completed: false, active: true },
        { id: 6, title: "Where to Keep Your Fund", type: "📄", duration: "8 min", completed: false },
      ]},
      { title: "Module 3: Debt Payoff", lessons: [
        { id: 7, title: "The Debt Snowball Method", type: "🎬", duration: "15 min", completed: false },
        { id: 8, title: "The Debt Avalanche Method", type: "🎬", duration: "12 min", completed: false },
        { id: 9, title: "Negotiating Interest Rates", type: "📄", duration: "10 min", completed: false },
      ]},
      { title: "Module 4: Investing Basics", lessons: [
        { id: 10, title: "Stocks, Bonds & Index Funds", type: "🎬", duration: "20 min", completed: false },
        { id: 11, title: "The Power of Compound Interest", type: "🧮", duration: "12 min", completed: false },
        { id: 12, title: "Opening Your First Investment Account", type: "🎬", duration: "16 min", completed: false },
      ]},
    ]
  },
  medical: {
    title: "Medical Finances: Full Course",
    totalLessons: 10,
    completedLessons: 0,
    modules: [
      { title: "Module 1: Insurance", lessons: [
        { id: 1, title: "HMO vs PPO vs HDHP", type: "🎬", duration: "15 min", completed: false },
        { id: 2, title: "Key Insurance Terms", type: "📄", duration: "10 min", completed: false },
      ]},
      { title: "Module 2: Medical Debt", lessons: [
        { id: 3, title: "When You Get a Big Bill", type: "🎬", duration: "14 min", completed: false },
        { id: 4, title: "Your Patient Rights", type: "📄", duration: "8 min", completed: false },
      ]},
      { title: "Module 3: HSA & FSA", lessons: [
        { id: 5, title: "HSA vs FSA Explained", type: "🎬", duration: "16 min", completed: false },
        { id: 6, title: "Maximizing Tax-Free Savings", type: "📄", duration: "10 min", completed: false },
      ]},
    ]
  }
};

const lessonContent = {
  5: {
    breadcrumb: "Launch Pad → Module 2: Emergency Fund",
    title: "Building an Emergency Fund on a Tight Budget",
    tags: ["Emergency Fund", "Budgeting", "Saving"],
    duration: "16 min",
    type: "Video Lesson",
    intro: "Building an emergency fund when money is already tight feels impossible — but it's actually more critical when your finances are stretched. The key is shifting from trying to save a large lump sum to building a small, consistent habit that compounds over time.",
    sections: [
      { heading: "Why "I Can't Afford To Save" Is the Trap", body: "The cruel irony of financial stress is that it discourages the very behavior that would reduce that stress. When every dollar is accounted for, saving feels like an impossibility. But consider: if you had $500 in savings right now, how many of your recent financial stressors would have been solved or significantly reduced? For most people, the answer is \"most of them.\"" },
      { concept: { label: "KEY INSIGHT", text: "Your goal isn't to save three months of expenses overnight. Your goal is to save $500 before the next emergency happens. That one number changes your entire financial trajectory." }},
      { heading: "The Micro-Saving Method", body: "Instead of budgeting a fixed amount to save each month, use the \"micro-saving\" approach: identify 3–5 small, painless spending adjustments that collectively free up $20–$50/week. That adds up to $1,040–$2,600/year — more than enough for a starter emergency fund." },
      { example: { scenario: "Maya earns $2,800/month after taxes. After rent, food, and bills, she has about $180 left. Instead of trying to save a fixed $100, she:\n• Cuts one streaming service: +$15/mo\n• Meal preps 3 lunches/week: +$45/mo\n• Cancels unused gym membership: +$40/mo\nTotal new savings capacity: $100/month = $1,200/year" }},
      { heading: "Where to Keep It — And Why It Matters", body: "Your emergency fund should live in a high-yield savings account (HYSA), not your regular checking account. Keeping it separate prevents accidental spending. Current HYSAs offer 4–5% APY — your money actually grows while it waits." },
      { quiz: true }
    ]
  }
};

let currentLessonId = 5;
let currentCourse = 'launchpad';

function buildSidebar(course) {
  const data = courses[course];
  document.getElementById('sidebarTitle').textContent = data.title;
  const pct = Math.round((data.completedLessons / data.totalLessons) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${data.completedLessons} of ${data.totalLessons} lessons complete`;

  const list = document.getElementById('moduleList');
  list.innerHTML = '';
  data.modules.forEach(mod => {
    const header = document.createElement('div');
    header.className = 'module-group-header';
    header.textContent = mod.title;
    list.appendChild(header);
    mod.lessons.forEach(lesson => {
      const item = document.createElement('div');
      item.className = 'lesson-item' + (lesson.completed ? ' completed' : '') + (lesson.active || lesson.id === currentLessonId ? ' active' : '');
      item.onclick = () => loadLesson(lesson.id, course);
      item.innerHTML = `<div class="lesson-icon">${lesson.completed ? '✓' : lesson.type}</div><div class="lesson-info"><div class="lesson-name">${lesson.title}</div><div class="lesson-meta"><span>${lesson.duration}</span></div></div>`;
      list.appendChild(item);
    });
  });
}

function loadLesson(id, course) {
  currentLessonId = id;
  document.querySelectorAll('.lesson-item').forEach(el => el.classList.remove('active'));
  buildSidebar(course);
  renderLesson();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function switchCourse(val) {
  currentCourse = val;
  currentLessonId = courses[val].modules[0].lessons[0].id;
  buildSidebar(val);
  renderLesson();
}

function renderLesson() {
  const content = lessonContent[currentLessonId];
  const main = document.getElementById('courseMain');

  if (!content) {
    // Generic lesson for other IDs
    const allLessons = courses[currentCourse].modules.flatMap(m => m.lessons);
    const lesson = allLessons.find(l => l.id === currentLessonId);
    const name = lesson ? lesson.title : 'Lesson';
    main.innerHTML = `
      <div class="video-player"><div class="video-bg-pattern"></div><div class="play-button">▶</div><div class="video-label">${name.toUpperCase()}</div><div class="video-duration">${lesson ? lesson.duration : '—'}</div></div>
      <div class="lesson-breadcrumb">${courses[currentCourse].title} → Coming Soon</div>
      <h1 class="lesson-title">${name}</h1>
      <div class="lesson-tags"><span class="tag">Video Lesson</span><span class="tag tag-gold">Free</span></div>
      <p class="lesson-intro">This lesson is coming soon. Our curriculum team is currently finalizing the content for this module. Check back shortly, or explore other lessons in this program.</p>
      ${buildLessonNav()}
    `;
    return;
  }

  let sectionsHtml = '';
  content.sections.forEach(s => {
    if (s.heading) sectionsHtml += `<div class="content-block"><h3>${s.heading}</h3><p>${s.body}</p></div>`;
    if (s.concept) sectionsHtml += `<div class="key-concept"><div class="key-concept-label">${s.concept.label}</div><div class="key-concept-text">${s.concept.text}</div></div>`;
    if (s.example) sectionsHtml += `<div class="example-box"><div class="example-label">📊 Real-World Example</div><div class="example-scenario">${s.example.scenario.replace(/\n/g,'<br>')}</div></div>`;
    if (s.quiz) sectionsHtml += buildQuiz();
  });

  main.innerHTML = `
    <div class="video-player">
      <div class="video-bg-pattern"></div>
      <div class="play-button" onclick="this.innerHTML='⏸'">▶</div>
      <div class="video-label">${content.type.toUpperCase()}</div>
      <div class="video-duration">${content.duration}</div>
    </div>
    <div class="lesson-breadcrumb">${content.breadcrumb}</div>
    <h1 class="lesson-title">${content.title}</h1>
    <div class="lesson-tags">${content.tags.map(t => `<span class="tag">${t}</span>`).join('')}<span class="tag tag-gold">Free</span></div>
    <div class="lesson-body">
      <p class="lesson-intro">${content.intro}</p>
      ${sectionsHtml}
    </div>
    <div class="resources-panel">
      <div class="resources-panel-title">📎 Lesson Resources</div>
      <div class="resource-links">
        <a href="#" class="resource-link"><span class="resource-link-icon">📄</span>Emergency Fund Worksheet (PDF)</a>
        <a href="#" class="resource-link"><span class="resource-link-icon">🧮</span>Emergency Fund Calculator</a>
        <a href="#" class="resource-link"><span class="resource-link-icon">📋</span>Top High-Yield Savings Accounts (2025)</a>
      </div>
    </div>
    ${buildLessonNav()}
  `;
}

function buildQuiz() {
  return `
    <div class="quiz-block">
      <div class="quiz-label">🧠 Quick Check</div>
      <div class="quiz-question">What is the recommended first milestone for an emergency fund?</div>
      <div class="quiz-options">
        <div class="quiz-option" onclick="answerQuiz(this, false)"><div class="quiz-option-letter">A</div>6 months of all expenses saved</div>
        <div class="quiz-option" onclick="answerQuiz(this, false)"><div class="quiz-option-letter">B</div>$10,000 in a money market account</div>
        <div class="quiz-option" onclick="answerQuiz(this, true)"><div class="quiz-option-letter">C</div>$500–$1,000 as a starter fund</div>
        <div class="quiz-option" onclick="answerQuiz(this, false)"><div class="quiz-option-letter">D</div>Enough to cover 1 month's rent</div>
      </div>
      <div class="quiz-feedback" id="quizFeedback"></div>
    </div>
  `;
}

function answerQuiz(el, correct) {
  document.querySelectorAll('.quiz-option').forEach(o => o.onclick = null);
  const fb = document.getElementById('quizFeedback');
  if (correct) {
    el.classList.add('correct');
    fb.className = 'quiz-feedback show correct-fb';
    fb.textContent = '✓ Correct! Starting with $500–$1,000 gives you protection against the most common emergencies without feeling overwhelming. Once you hit that, aim for one month, then three.';
  } else {
    el.classList.add('wrong');
    document.querySelectorAll('.quiz-option')[2].classList.add('correct');
    fb.className = 'quiz-feedback show wrong-fb';
    fb.textContent = '✗ Not quite. The first goal is $500–$1,000 — a "starter fund" that handles most everyday emergencies. Building to 3–6 months comes later.';
  }
}

function buildLessonNav() {
  const allLessons = courses[currentCourse].modules.flatMap(m => m.lessons);
  const idx = allLessons.findIndex(l => l.id === currentLessonId);
  const prev = idx > 0 ? allLessons[idx - 1] : null;
  const next = idx < allLessons.length - 1 ? allLessons[idx + 1] : null;
  return `
    <div class="lesson-nav">
      ${prev ? `<div class="nav-prev" onclick="loadLesson(${prev.id}, '${currentCourse}')"><span>←</span><div><div class="nav-direction">PREVIOUS</div><div class="nav-lesson-name">${prev.title}</div></div></div>` : '<div></div>'}
      <button class="mark-complete-btn btn-primary" onclick="markComplete(this)">Mark Complete ✓</button>
      ${next ? `<div class="nav-next" onclick="loadLesson(${next.id}, '${currentCourse}')"><div style="text-align:right"><div class="nav-direction">NEXT UP</div><div class="nav-lesson-name">${next.title}</div></div><span>→</span></div>` : '<div></div>'}
    </div>
  `;
}

function markComplete(btn) {
  btn.textContent = '✓ Completed!';
  btn.style.background = 'var(--mint)';
  btn.disabled = true;
  // Update sidebar
  const allLessons = courses[currentCourse].modules.flatMap(m => m.lessons);
  const lesson = allLessons.find(l => l.id === currentLessonId);
  if (lesson && !lesson.completed) {
    lesson.completed = true;
    courses[currentCourse].completedLessons++;
    buildSidebar(currentCourse);
  }
}

// Init
buildSidebar(currentCourse);
renderLesson();
</script>
<script>
(function(){
  // Scroll effect
  var nav = document.getElementById('mainNav');
  window.addEventListener('scroll', function(){
    nav.classList.toggle('scrolled', window.scrollY > 40);
  });
  // Mark active page
  var page = location.pathname.split('/').pop() || 'index.html';
  var map = {'index.html':'nl-home','about.html':'nl-about','curriculum.html':'nl-curriculum','medical.html':'nl-medical','course.html':'nl-course'};
  if(map[page]){ var el=document.getElementById(map[page]); if(el) el.classList.add('active'); }
})();
</script>
